<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bible Verse of the Day</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background: #F8F1E4;
    color: #0A2342;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
    font-family: Georgia, serif;
  }

  main {
    width: 100%;
    max-width: 760px;
    text-align: center;
  }

  .label {
    font-size: 0.72rem;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    opacity: 0.6;
    margin-bottom: 32px;
    font-family: sans-serif;
  }

  blockquote {
    font-size: clamp(1.4rem, 4vw, 2.6rem);
    line-height: 1.5;
    font-style: italic;
    min-height: 5rem;
    transition: opacity 0.4s;
  }

  blockquote.loading { opacity: 0.4; }

  .reference {
    margin-top: 28px;
    font-size: clamp(1rem, 2.5vw, 1.4rem);
    font-weight: bold;
    letter-spacing: 0.02em;
  }

  .controls {
    margin-top: 48px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 14px;
  }

  button {
    border: 1.5px solid #0A2342;
    background: transparent;
    color: #0A2342;
    padding: 12px 28px;
    font-size: 0.75rem;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    border-radius: 50px;
    cursor: pointer;
    font-family: sans-serif;
    transition: background 0.2s, color 0.2s;
  }

  button:hover {
    background: #0A2342;
    color: #F8F1E4;
  }

  .timer {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0.5;
    font-family: sans-serif;
  }

  .error { color: #c0392b; font-size: 0.9rem; }
</style>
</head>
<body>
<main>
  <p class="label">NET Bible</p>
  <blockquote id="verseText" class="loading">"Loading verse…"</blockquote>
  <p class="reference" id="verseRef"></p>
  <div class="controls">
    <button onclick="showNext()">Show another</button>
    <p class="timer" id="timerLabel"></p>
  </div>
</main>

<script>
const ROTATION_MS = 10 * 60 * 1000; // 10 minutes

const references = [
  "John 3:16","Jeremiah 29:11","Romans 8:28","Philippians 4:13","Psalm 23:1-2",
  "Proverbs 3:5-6","Isaiah 41:10","Matthew 11:28-30","Psalm 46:10","Romans 12:2",
  "2 Corinthians 5:17","Psalm 91:1-2","Joshua 1:9","Lamentations 3:22-23","1 Peter 5:7",
  "Psalm 34:8","Psalm 37:4","Ephesians 2:8-9","Galatians 5:22-23","Hebrews 11:1",
  "James 1:5","John 14:27","Psalm 121:1-2","Romans 15:13","Psalm 139:13-14",
  "Micah 6:8","Matthew 6:33","1 Corinthians 13:4-7","Hebrews 4:16","Isaiah 40:31",
  "Psalm 27:1","Psalm 118:24","Romans 5:8","John 15:5","2 Timothy 1:7",
  "Numbers 6:24-26","Psalm 19:14","Psalm 51:10","Romans 10:9","Colossians 3:23",
  "Psalm 119:105","Matthew 5:14-16","John 16:33","1 John 4:18","Psalm 55:22",
  "Deuteronomy 31:6","Isaiah 26:3","Psalm 103:1-2","Romans 8:31","Ephesians 3:20",
  "Philippians 4:6-7","Psalm 16:8","Psalm 30:5","Matthew 28:19-20","John 1:1-2",
  "John 8:12","Romans 6:23","1 Corinthians 10:13","2 Corinthians 12:9","Galatians 2:20",
  "Ephesians 6:10","Philippians 1:6","Colossians 3:2","1 Thessalonians 5:16-18",
  "Hebrews 12:1-2","James 1:2-4","1 John 1:9","Revelation 21:4","Genesis 1:1",
  "Exodus 14:14","Deuteronomy 6:5","Isaiah 9:6","Matthew 22:37-39","Mark 10:27",
  "Luke 1:37","John 10:10","John 14:6","John 13:34-35","Acts 1:8",
  "Romans 8:1","Romans 8:38-39","Romans 12:1","1 Corinthians 15:58","2 Corinthians 4:16-18",
  "Galatians 6:9","Ephesians 4:29","Philippians 2:3-4","Philippians 4:8","Philippians 4:19",
  "Colossians 3:12-14","1 Timothy 4:12","2 Timothy 3:16-17","Hebrews 10:23-25",
  "James 1:17","1 Peter 2:9","1 John 4:7-8","Revelation 3:20","Zephaniah 3:17",
  "Isaiah 43:1-2","Isaiah 53:5","Psalm 73:26","Psalm 145:8-9","Proverbs 16:3"
];

const cache = {};
let currentIndex = Math.floor(Date.now() / ROTATION_MS) % references.length;

function formatRef(ref) {
  return ref.trim().replace(/ /g, '+');
}

async function fetchVerse(ref) {
  if (cache[ref]) return cache[ref];
  const res = await fetch(`https://labs.bible.org/api/?passage=${formatRef(ref)}&type=json`);
  if (!res.ok) throw new Error('Failed to load');
  const data = await res.json();
  if (!Array.isArray(data) || !data.length) throw new Error('No data');
  const text = data.map(v => v.text).join(' ');
  cache[ref] = text;
  return text;
}

async function loadVerse(index) {
  const ref = references[index];
  const el = document.getElementById('verseText');
  const refEl = document.getElementById('verseRef');

  el.className = 'loading';
  el.textContent = '"Loading verse…"';
  refEl.textContent = '';

  try {
    const text = await fetchVerse(ref);
    el.className = '';
    el.textContent = '“' + text + '”';
    refEl.textContent = ref;
  } catch {
    el.className = 'error';
    el.textContent = 'Verse could not be loaded. Try another.';
    refEl.textContent = ref;
  }
}

function showNext() {
  currentIndex = (currentIndex + 1) % references.length;
  loadVerse(currentIndex);
}

function updateTimer() {
  const minsLeft = 10 - (Math.floor(Date.now() / 60000) % 10);
  document.getElementById('timerLabel').textContent =
    `Changes every 10 minutes • ${minsLeft} minute${minsLeft === 1 ? '' : 's'} left`;
}

// Sync to time-based rotation
function syncIndex() {
  const autoIndex = Math.floor(Date.now() / ROTATION_MS) % references.length;
  if (autoIndex !== currentIndex) {
    currentIndex = autoIndex;
    loadVerse(currentIndex);
  }
}

loadVerse(currentIndex);
updateTimer();
setInterval(syncIndex, 5000);
setInterval(updateTimer, 15000);
</script>
</body>
</html>
